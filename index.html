<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayClone - Find your next adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="flex items-center justify-between px-10 py-4 bg-white border-b sticky top-0 z-50">
        <div class="text-pink-600 font-bold text-2xl">StayClone</div>
        <div class="hidden md:flex space-x-6 font-semibold text-gray-600">
            <a href="#">Stays</a>
            <a href="#">Experiences</a>
            <a href="#">Online Experiences</a>
        </div>
        <div class="border rounded-full py-2 px-4 shadow-sm hover:shadow-md transition cursor-pointer">
            <span class="font-semibold">Sign In</span>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto mt-10 p-6">
        <div class="bg-white shadow-xl rounded-full p-4 flex items-center justify-between border">
            <div class="px-6 border-r flex-1">
                <p class="text-xs font-bold">Location</p>
                <input type="text" placeholder="Where are you going?" class="outline-none text-sm w-full">
            </div>
            <div class="px-6 border-r flex-1">
                <p class="text-xs font-bold">Check in</p>
                <p class="text-sm text-gray-400">Add dates</p>
            </div>
            <div class="px-6 flex-1">
                <p class="text-xs font-bold">Who</p>
                <p class="text-sm text-gray-400">Add guests</p>
            </div>
            <button class="bg-pink-600 text-white p-4 rounded-full">Search</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="cursor-pointer group">
            <div class="aspect-square overflow-hidden rounded-xl">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800" class="object-cover h-full w-full group-hover:scale-105 transition duration-300">
            </div>
            <h3 class="font-bold mt-2">Lake Como, Italy</h3>
            <p class="text-gray-500">4,500 miles away</p>
            <p class="text-gray-500 underline">Oct 12-17</p>
            <p class="mt-1"><span class="font-bold">$420</span> night</p>
        </div>
        </main>
</body>
</html>
